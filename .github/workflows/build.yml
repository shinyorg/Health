name: Build

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

  push:
    branches:
    - main
    - dev
    - preview
    - v*

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
          fetch-depth: 0

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
          dotnet-version: '10.0.x'
          workloads: maui-ios, maui-android

    - name: Build
      run: dotnet build Shiny.Health/Shiny.Health.csproj -c Release -p:PublicRelease=true

    - name: Post NuGet Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-artifacts
        path: '**/*.nupkg'

    - name: Publish NuGets
      if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/v') }}
      run: dotnet nuget push **\*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGETAPIKEY }} --skip-duplicate
